<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production Issues & Resolutions — Learning Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="assets/css/theme.css" />
  <link rel="stylesheet" href="assets/css/site.css" />
</head>
<body>
  <main>
    <section class="section">
      <div class="container">
        <div class="level">
          <div class="level-left">
            <div class="level-item">
              <div>
                <p class="heading">Technology Deep-Dives</p>
                <h1 class="title">Production Issues &amp; Resolutions</h1>
                <p class="subtitle">Twenty-eight failure domains across Kafka, MongoDB, Redis, Cassandra, Kubernetes, Elasticsearch, and API Gateway.</p>
              </div>
            </div>
          </div>
          <div class="level-right">
            <div class="level-item">
              <a class="button is-light" href="index.html">Back</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="columns">
          <aside class="column is-one-quarter">
            <div class="box">
              <p class="heading">All Topics</p>
              <div id="navList"></div>
            </div>
          </aside>

          <main class="column">
            <div class="box">
              <div id="loadingState" class="has-text-centered mb-4">
                <button class="button is-white is-loading" type="button">Loading</button>
              </div>
              <iframe id="contentFrame" title="Technology issue details"></iframe>
            </div>
          </main>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="level">
          <div class="level-left">
            <div class="level-item">
              <p>Twenty-eight production issue deep-dives across seven technologies</p>
            </div>
          </div>
          <div class="level-right">
            <div class="level-item">
              <p>Last updated May 2026</p>
            </div>
          </div>
        </div>
      </div>
    </footer>
  </main>

  <script>
    const contentFrame = document.getElementById('contentFrame');
    const loadingState = document.getElementById('loadingState');
    const navList = document.getElementById('navList');

    const topics = [
      {
        category: 'Kafka',
        type: 'Messaging',
        issues: [
          { title: 'Throughput imbalance', page: 'kafka-throughput.html' },
          { title: 'Cluster coordination instability', page: 'kafka-coordination.html' },
          { title: 'Storage and replication pressure', page: 'kafka-storage.html' },
          { title: 'Partitioning and data distribution issues', page: 'kafka-partition.html' }
        ]
      },
      {
        category: 'MongoDB',
        type: 'Database',
        issues: [
          { title: 'Query performance degradation', page: 'mongodb-query.html' },
          { title: 'Replication and consistency delays', page: 'mongodb-replication.html' },
          { title: 'Data distribution imbalance', page: 'mongodb-distribution.html' },
          { title: 'Resource saturation', page: 'mongodb-resources.html' }
        ]
      },
      {
        category: 'Redis',
        type: 'Cache',
        issues: [
          { title: 'Memory pressure', page: 'redis-memory.html' },
          { title: 'Data access imbalance', page: 'redis-access.html' },
          { title: 'Replication and persistence delays', page: 'redis-replication.html' },
          { title: 'Latency and blocking operations', page: 'redis-latency.html' }
        ]
      },
      {
        category: 'Cassandra',
        type: 'Database',
        issues: [
          { title: 'Data distribution imbalance', page: 'cassandra-distribution.html' },
          { title: 'Storage and compaction pressure', page: 'cassandra-compaction.html' },
          { title: 'Consistency and repair problems', page: 'cassandra-consistency.html' },
          { title: 'Read amplification and tombstones', page: 'cassandra-tombstones.html' }
        ]
      },
      {
        category: 'Kubernetes',
        type: 'Orchestration',
        issues: [
          { title: 'Resource exhaustion', page: 'kubernetes-resources.html' },
          { title: 'Scheduling and placement failures', page: 'kubernetes-scheduling.html' },
          { title: 'Application lifecycle instability', page: 'kubernetes-lifecycle.html' },
          { title: 'Cluster networking problems', page: 'kubernetes-networking.html' }
        ]
      },
      {
        category: 'API Gateway',
        type: 'Gateway',
        issues: [
          { title: 'Traffic management and overload', page: 'api-gateway-traffic.html' },
          { title: 'Authentication and authorization failures', page: 'api-gateway-auth.html' },
          { title: 'Upstream dependency instability', page: 'api-gateway-upstream.html' },
          { title: 'Connection and resource exhaustion', page: 'api-gateway-connections.html' }
        ]
      },
      {
        category: 'Elasticsearch',
        type: 'Search',
        issues: [
          { title: 'Query execution pressure', page: 'elasticsearch-query.html' },
          { title: 'Heap and memory pressure', page: 'elasticsearch-memory.html' },
          { title: 'Shard distribution imbalance', page: 'elasticsearch-shards.html' },
          { title: 'Indexing and merge backpressure', page: 'elasticsearch-indexing.html' }
        ]
      }
    ];

    // Render navigation
    topics.forEach(topic => {
      const section = document.createElement('div');
      section.className = 'block';
      
      const header = document.createElement('div');
      header.className = 'mb-2';
      
      const title = document.createElement('div');
      title.className = 'level is-mobile';
      
      const titleLeft = document.createElement('div');
      titleLeft.className = 'level-left';
      titleLeft.innerHTML = `<div class="level-item"><strong>${topic.category}</strong></div>`;
      
      const titleRight = document.createElement('div');
      titleRight.className = 'level-right';
      titleRight.innerHTML = `<div class="level-item"><span class="tag is-light">${topic.type}</span></div>`;
      
      title.appendChild(titleLeft);
      title.appendChild(titleRight);
      header.appendChild(title);
      
      const menu = document.createElement('div');
      menu.className = 'menu';
      const list = document.createElement('ul');
      list.className = 'menu-list';
      
      topic.issues.forEach(issue => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.dataset.page = issue.page;
        a.dataset.category = topic.type;
        a.textContent = issue.title;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadPage(issue.page);
        });
        li.appendChild(a);
        list.appendChild(li);
      });
      
      menu.appendChild(list);
      section.appendChild(header);
      section.appendChild(menu);
      navList.appendChild(section);
    });

    const navLinks = document.querySelectorAll('[data-page]');

    function loadPage(pageUrl) {
      loadingState.classList.remove('is-hidden');
      contentFrame.src = `tech-issues/${pageUrl}`;

      navLinks.forEach(link => {
        link.classList.toggle('is-active', link.dataset.page === pageUrl);
      });

      window.location.hash = pageUrl.replace('.html', '');
    }

    contentFrame.addEventListener('load', () => {
      loadingState.classList.add('is-hidden');
    });

    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.substring(1);
      if (hash) {
        const pageUrl = `${hash}.html`;
        const matchingLink = Array.from(navLinks).find(link => link.dataset.page === pageUrl);
        if (matchingLink) {
          loadPage(pageUrl);
        }
      }
    });

    const initialHash = window.location.hash.substring(1);
    const initialPage = initialHash ? `${initialHash}.html` : 'api-gateway-traffic.html';
    const validPage = Array.from(navLinks).some(link => link.dataset.page === initialPage);
    loadPage(validPage ? initialPage : 'api-gateway-traffic.html');
  </script>
</body>
</html>
