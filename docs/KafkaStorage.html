<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kafka — Storage & Replication Pressure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface-2: #1b1b21;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text-primary: #e8e6e1;
      --text-secondary: #8a8882;
      --text-tertiary: #55544f;
      --accent: #e85d26;
      --accent-dim: rgba(232, 93, 38, 0.12);
      --accent-border: rgba(232, 93, 38, 0.3);
      --info: #2d7dd2;
      --info-dim: rgba(45, 125, 210, 0.1);
      --info-border: rgba(45, 125, 210, 0.3);
      --warn-dim: rgba(200, 140, 40, 0.1);
      --warn-text: #c8a050;
      --warn-border: rgba(200, 140, 40, 0.25);
      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 6px;
      --radius-lg: 10px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Hero */
    .hero {
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 2rem 2.25rem 1.75rem;
      margin-bottom: 2rem;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 680px;
    }

    /* Section */
    .section { margin-bottom: 2rem; }
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }

    /* Synonyms */
    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 13px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: border-color 0.15s, color 0.15s;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text-primary); }

    /* Interview questions */
    .q-list { display: flex; flex-direction: column; gap: 8px; }
    .q-item {
      font-size: 14px;
      line-height: 1.55;
      padding: 11px 15px 11px 42px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      position: relative;
      transition: border-color 0.15s;
    }
    .q-item::before {
      content: '"';
      position: absolute;
      left: 14px;
      top: 10px;
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--accent);
      line-height: 1;
    }
    .q-item:hover { border-color: var(--border-hover); color: var(--text-primary); }

    /* Tabs */
    .layer-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 1px;
    }
    .tab-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }
    .tab-btn:hover { color: var(--text-secondary); background: var(--surface-2); }
    .tab-btn.active {
      background: var(--surface-2);
      color: var(--accent);
      border-color: var(--border);
      border-bottom: 1px solid var(--surface-2);
      position: relative;
      z-index: 1;
    }

    /* Layer card */
    .layer-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 1.5rem 1.75rem;
      display: none;
    }
    .layer-card.visible { display: block; }
    .layer-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    .layer-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .layer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .sub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }
    .sub-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.5rem;
    }
    .sub-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .sub-list li {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .sub-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--text-tertiary);
    }

    /* Metrics */
    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.9rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
      align-items: center;
    }
    .metrics-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-right: 4px;
    }
    .metric-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--info-dim);
      color: var(--info);
      border: 1px solid var(--info-border);
    }

    /* Tradeoffs */
    .tradeoff-box {
      background: var(--warn-dim);
      border: 1px solid var(--warn-border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .tradeoff-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warn-text);
      margin-bottom: 0.4rem;
    }
    .tradeoff-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .tradeoff-list li {
      font-size: 13px;
      color: var(--warn-text);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .tradeoff-list li::before {
      content: '⚠';
      position: absolute;
      left: 0;
      font-size: 10px;
      top: 2px;
    }

    /* Comparison table */
    .compare-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .compare-table th {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .compare-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table td:first-child {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .compare-table td:last-child {
      color: var(--accent);
    }
    .compare-table tr:hover td { background: var(--surface-2); }

    /* Insight */
    .insight {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.25rem;
      margin-top: 2rem;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .insight p {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.7;
    }

    @media (max-width: 600px) {
      .layer-grid { grid-template-columns: 1fr; }
      .hero { padding: 1.5rem 1.25rem; }
      .hero h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>

  <script>
    // Data configuration - reusable for different topics
    const pageData = {
      hero: {
        eyebrow: "Apache Kafka — distributed systems",
        title: "Storage & replication pressure",
        description: "Staff+/Principal-level guide covering disk throughput bottlenecks, replication lag, ISR shrink, segment management pressure, and storage-bound scalability failures."
      },
      synonyms: [
        "Replication lag",
        "ISR shrink",
        "Under replicated partitions",
        "Broker saturation",
        "Disk pressure",
        "IO saturation",
        "Replication bottleneck",
        "Replica fetch lag",
        "Storage bottleneck",
        "Disk throughput exhaustion",
        "Broker IO pressure",
        "Kafka disk saturation"
      ],
      questions: [
        "Why do Kafka partitions become under replicated?",
        "How would you debug ISR shrink in Kafka?",
        "Why does producer latency increase even though consumers are healthy?",
        "How does disk saturation impact Kafka throughput?",
        "What causes Kafka replication lag?",
        "Why does Kafka performance degrade during retention spikes?",
        "How does replication factor affect Kafka scalability?",
        "What happens when follower brokers cannot keep up?"
      ],
      layers: [
        {
          name: "Broker Disk",
          title: "Broker disk layer pressure",
          description: "Kafka relies heavily on fast sequential disk IO. Every broker continuously appends logs, flushes segments, serves reads, and performs replication writes. When disk throughput becomes saturated, broker responsiveness degrades rapidly, especially in high-throughput clusters and large retention systems.",
          symptoms: ["Increased producer latency from slow persistence", "Followers fall behind leaders (ISR shrink)", "Broker request queue grows continuously", "Disk utilization near 100% with IO wait spikes", "Consumer fetch latency increases"],
          causes: ["Insufficient disk throughput for traffic (HDDs with SSD-scale traffic)", "Large message sizes (10MB+ payloads)", "Excessive retention (90+ days on high-throughput topics)", "Excessive partition count (too many open file handles)", "Broker hotspotting with many hot partitions"],
          effects: ["Producer timeout failures and slow acknowledgements", "Replication instability and followers lagging", "ISR shrinks, reducing fault tolerance", "Consumer lag from delayed fetch responses", "Cluster-wide cascading instability"],
          mitigations: ["Upgrade to SSD/NVMe storage", "Reduce message sizes and move blobs externally", "Rebalance partitions to avoid hotspotting", "Reduce retention for ultra-hot topics", "Tune segment.bytes and retention.bytes", "Increase broker count to spread load"],
          metrics: ["Disk utilization", "IO wait", "Log flush latency", "Request queue size", "Bytes in/out", "Under replicated partitions"],
          tradeoffs: ["More brokers increase operational complexity", "Lower retention reduces replay capability", "Larger segment sizes slow recovery and compaction"]
        },
        {
          name: "Replication",
          title: "Replica synchronization pressure",
          description: "Followers continuously fetch data from leaders via replication pipelines. If replication throughput cannot keep up with leader writes, followers lag behind, ISR shrinks, and replication instability appears. This is critical for fault tolerance and durability guarantees.",
          symptoms: ["Replica fetch lag growing", "Under replicated partitions increasing", "Fluctuating ISR counts", "Producer ack delays for acks=all", "Follower disks struggling with write rate"],
          causes: ["Slow follower disks unable to persist replicated data", "Network bottlenecks between brokers", "Overloaded brokers handling too many replicas", "Cross-AZ latency amplifying replication time", "Excessive replication factor for topology"],
          effects: ["Weaker fault tolerance with smaller ISR", "Increased write latency for durability", "Leader election instability", "Risk of unclean elections and data loss", "Cascading failures across cluster"],
          mitigations: ["Faster replication network paths", "Reduce broker imbalance and hotspotting", "Tune replica.fetch.max.bytes for optimal throughput", "Reduce replication factor where appropriate", "Separate replication traffic from client traffic"],
          metrics: ["Replica fetch lag", "ISR size per partition", "Replication fetch rate", "Network latency between brokers", "Follower disk write latency"],
          tradeoffs: ["Lower replication factor reduces durability", "Dedicated replication bandwidth increases complexity", "Tuning fetch sizes impacts memory usage"]
        },
        {
          name: "Retention",
          title: "Retention & segment management pressure",
          description: "Kafka continuously rolls segments, deletes old segments, and compacts logs. Heavy retention activity creates significant storage housekeeping pressure that competes with replication and client fetch operations, creating IO amplification.",
          symptoms: ["Disk IO spikes during cleanup periods", "Periodic broker slowdowns at scheduled compaction times", "Compaction backlog accumulating", "Page cache churn from excessive IO", "Broker unresponsiveness during retention enforcement"],
          causes: ["Excessive retention windows (90+ days on high-throughput topics)", "Compacted topics under heavy message churn", "Extremely small segment sizes creating many files", "Too many partitions with retention overhead", "Inefficient deletion policies"],
          effects: ["IO amplification and storage fragmentation", "Slower replication as disk becomes saturated", "Increased broker instability and latency variance", "Page cache inefficiency", "Cascading failures during housekeeping"],
          mitigations: ["Optimize retention windows to minimum viable", "Tune compaction policies for topic patterns", "Increase segment sizes (segment.ms and segment.bytes)", "Reduce unnecessary partition count", "Use log retention policies effectively"],
          metrics: ["Segment deletion rate", "Compaction lag", "Disk throughput during cleanup", "Page cache hit ratio", "GC pause times"],
          tradeoffs: ["Longer retention increases storage costs", "Smaller segments improve recovery speed but increase overhead", "Aggressive compaction impacts memory"]
        },
        {
          name: "Network",
          title: "Network replication pressure",
          description: "Replication itself consumes significant network bandwidth. Heavy replication traffic can saturate network interfaces, cross-AZ bandwidth, and inter-broker communication links, creating latency and packet loss that amplifies replication lag.",
          symptoms: ["Replication fetch lag despite healthy disks", "Packet retransmissions visible in network metrics", "NIC saturation on broker NICs", "Increased request latency across cluster", "Cross-AZ replication severely lagging"],
          causes: ["Large message payloads amplifying network traffic", "Excessive replication factor creating too many replicas", "Cross-region replication over high-latency links", "Burst traffic overwhelming network capacity", "Inadequate bandwidth provisioning"],
          effects: ["Replication slowdown despite fast local disks", "ISR instability from replication delays", "Producer latency spikes for acks=all", "Leader flapping from connectivity issues", "Network-induced cascading failures"],
          mitigations: ["Enable compression (snappy, lz4, zstd)", "Better networking infrastructure (higher throughput)", "Traffic balancing and rate limiting", "Dedicated replication bandwidth allocation", "Reduce payload sizes where possible"],
          metrics: ["Replication fetch lag", "Network saturation per NIC", "Packet retransmissions", "Cross-region latency", "Bytes sent/received"],
          tradeoffs: ["Compression increases CPU usage", "Dedicated bandwidth increases infrastructure cost", "Reducing replication factor reduces durability"]
        }
      ],
      comparisons: [
        { tech: "MongoDB", problem: "Replication lag" },
        { tech: "Cassandra", problem: "Compaction pressure" },
        { tech: "Elasticsearch", problem: "Merge pressure" },
        { tech: "Redis", problem: "Persistence bottleneck" },
        { tech: "Kubernetes", problem: "etcd disk saturation" }
      ],
      insight: "Distributed systems frequently become IO-bound long before they become CPU-bound. Kafka scalability is fundamentally constrained by storage throughput, replication efficiency, and balanced IO distribution. Strong Kafka engineering is often storage engineering disguised as streaming infrastructure."
    };

    // Render function
    function renderPage() {
      const root = document.getElementById('root');
      
      let html = `
        <div class="hero">
          <p class="hero-eyebrow">${pageData.hero.eyebrow}</p>
          <h1>${pageData.hero.title}</h1>
          <p>${pageData.hero.description}</p>
        </div>

        <div class="section">
          <p class="section-label">Common synonyms</p>
          <div class="pill-grid">
            ${pageData.synonyms.map(s => `<span class="pill">${s}</span>`).join('')}
          </div>
        </div>

        <div class="section">
          <p class="section-label">How interviewers phrase this</p>
          <div class="q-list">
            ${pageData.questions.map(q => `<div class="q-item">${q}</div>`).join('')}
          </div>
        </div>

        <div class="section">
          <p class="section-label">Layer-by-layer breakdown</p>
          <div class="layer-tabs">
            ${pageData.layers.map((l, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="showLayer(${i})">${l.name}</button>`).join('')}
          </div>

          ${pageData.layers.map((layer, idx) => `
            <div class="layer-card ${idx === 0 ? 'visible' : ''}" id="layer-${idx}">
              <p class="layer-title">${layer.title}</p>
              <p class="layer-desc">${layer.description}</p>
              <div class="layer-grid">
                <div class="sub-card">
                  <p class="sub-label">Observable symptoms</p>
                  <ul class="sub-list">
                    ${layer.symptoms.map(s => `<li>${s}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">Root causes</p>
                  <ul class="sub-list">
                    ${layer.causes.map(c => `<li>${c}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">System effects</p>
                  <ul class="sub-list">
                    ${layer.effects.map(e => `<li>${e}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">Mitigations</p>
                  <ul class="sub-list">
                    ${layer.mitigations.map(m => `<li>${m}</li>`).join('')}
                  </ul>
                </div>
              </div>
              <div class="metrics-row">
                <span class="metrics-label">Key metrics</span>
                ${layer.metrics.map(m => `<span class="metric-pill">${m}</span>`).join('')}
              </div>
              <div class="tradeoff-box">
                <p class="tradeoff-label">Tradeoffs</p>
                <ul class="tradeoff-list">
                  ${layer.tradeoffs.map(t => `<li>${t}</li>`).join('')}
                </ul>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="section">
          <p class="section-label">Universal distributed systems pattern</p>
          <div class="compare-wrap">
            <table class="compare-table">
              <thead>
                <tr>
                  <th>Technology</th>
                  <th>Equivalent problem</th>
                </tr>
              </thead>
              <tbody>
                ${pageData.comparisons.map(c => `
                  <tr>
                    <td>${c.tech}</td>
                    <td>${c.problem}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <div class="insight">
          <p>${pageData.insight}</p>
        </div>
      `;
      
      root.innerHTML = html;
    }

    function showLayer(idx) {
      document.querySelectorAll('.layer-card').forEach((c, i) => {
        c.classList.toggle('visible', i === idx);
      });
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
    }

    // Render on load
    renderPage();
  </script>
</body>
</html>
