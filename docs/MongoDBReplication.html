<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MongoDB — Replication & Consistency Delays</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface-2: #1b1b21;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text-primary: #e8e6e1;
      --text-secondary: #8a8882;
      --text-tertiary: #55544f;
      --accent: #e85d26;
      --accent-dim: rgba(232, 93, 38, 0.12);
      --accent-border: rgba(232, 93, 38, 0.3);
      --info: #2d7dd2;
      --info-dim: rgba(45, 125, 210, 0.1);
      --info-border: rgba(45, 125, 210, 0.3);
      --warn-dim: rgba(200, 140, 40, 0.1);
      --warn-text: #c8a050;
      --warn-border: rgba(200, 140, 40, 0.25);
      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 6px;
      --radius-lg: 10px;
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }
    .page { max-width: 860px; margin: 0 auto; }
    .hero {
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 2rem 2.25rem 1.75rem;
      margin-bottom: 2rem;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 680px;
    }
    .section { margin-bottom: 2rem; }
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }
    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 13px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: border-color 0.15s, color 0.15s;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .q-list { display: flex; flex-direction: column; gap: 8px; }
    .q-item {
      font-size: 14px;
      line-height: 1.55;
      padding: 11px 15px 11px 42px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      position: relative;
      transition: border-color 0.15s;
    }
    .q-item::before {
      content: '"';
      position: absolute;
      left: 14px;
      top: 10px;
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--accent);
      line-height: 1;
    }
    .q-item:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .layer-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1px; }
    .tab-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }
    .tab-btn:hover { color: var(--text-secondary); background: var(--surface-2); }
    .tab-btn.active {
      background: var(--surface-2);
      color: var(--accent);
      border-color: var(--border);
      border-bottom: 1px solid var(--surface-2);
      position: relative;
      z-index: 1;
    }
    .layer-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 1.5rem 1.75rem;
      display: none;
    }
    .layer-card.visible { display: block; }
    .layer-title { font-size: 16px; font-weight: 500; margin-bottom: 0.4rem; }
    .layer-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .layer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .sub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }
    .sub-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.5rem;
    }
    .sub-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .sub-list li {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .sub-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--text-tertiary);
    }
    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.9rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
      align-items: center;
    }
    .metrics-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-right: 4px;
    }
    .metric-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--info-dim);
      color: var(--info);
      border: 1px solid var(--info-border);
    }
    .tradeoff-box {
      background: var(--warn-dim);
      border: 1px solid var(--warn-border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .tradeoff-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warn-text);
      margin-bottom: 0.4rem;
    }
    .tradeoff-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .tradeoff-list li {
      font-size: 13px;
      color: var(--warn-text);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .tradeoff-list li::before {
      content: '⚠';
      position: absolute;
      left: 0;
      font-size: 10px;
      top: 2px;
    }
    .compare-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .compare-table th {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .compare-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table td:first-child {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .compare-table td:last-child { color: var(--accent); }
    .compare-table tr:hover td { background: var(--surface-2); }
    .insight {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.25rem;
      margin-top: 2rem;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .insight p {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.7;
    }
    @media (max-width: 600px) {
      .layer-grid { grid-template-columns: 1fr; }
      .hero { padding: 1.5rem 1.25rem; }
      .hero h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>
  <script>
    const pageData = {
      hero: {
        eyebrow: "MongoDB — replication architecture",
        title: "Replication & consistency delays",
        description: "Staff+/Principal-level guide covering secondary lag, oplog replication bottlenecks, replication throughput imbalance, and consistency guarantees in MongoDB replica sets."
      },
      synonyms: [
        "Secondary lag",
        "Replica lag",
        "Replication backlog",
        "Replication delay",
        "Oplog lag",
        "Write-after-read inconsistency",
        "Stale secondary reads",
        "Replication sync delay"
      ],
      questions: [
        "Why are secondaries lagging behind the primary?",
        "How do I debug oplog replication delays?",
        "What causes read-after-write inconsistency?",
        "Why is replication falling behind after traffic spikes?",
        "How does oplog sizing affect replication?",
        "What causes failover delays in MongoDB?",
        "Why are secondary reads returning stale data?",
        "How do I detect replication bottlenecks?"
      ],
      layers: [
        {
          name: "Oplog",
          title: "Oplog application & replication pipeline",
          description: "MongoDB replication uses an oplog (operations log) that the primary writes to and secondaries continuously apply. When secondaries cannot keep up with oplog application, replica lag accumulates, causing read-after-write inconsistency and failover delays.",
          symptoms: ["Increasing seconds of lag on secondaries", "Stale reads from secondaries", "Delayed failover due to lag", "Oplog application thread falling behind"],
          causes: ["Write throughput exceeds secondary disk IO capacity", "Large individual operations blocking oplog thread", "Replication lag from secondary disk saturation", "CPU contention on secondary processing oplog"],
          effects: ["Read-after-write inconsistency", "Delayed failover readiness", "Potential data loss if primary fails", "Increased inconsistency window"],
          mitigations: ["Increase secondary disk throughput (SSD)", "Reduce write throughput with batching", "Scale secondaries to match primary capacity", "Use better network for replication", "Optimize oplog processing"],
          metrics: ["Seconds of replication lag", "Oplog application rate", "Oplog entries queued", "Secondary replication thread latency", "Disk IO wait on secondary"],
          tradeoffs: ["More secondaries increase replication overhead", "Larger oplog consumes more disk space", "Faster replication requires better hardware"]
        },
        {
          name: "Network",
          title: "Network replication delays",
          description: "Replication data must traverse the network from primary to each secondary. Network latency, packet loss, and bandwidth limitations can significantly delay oplog application, especially across availability zones or regions.",
          symptoms: ["Consistent replication lag across all secondaries", "Lag increases during high-throughput periods", "Cross-AZ replication significantly lagging", "Network packet loss visible in metrics"],
          causes: ["High network latency between data centers", "Insufficient replication bandwidth", "Packet retransmissions on replication traffic", "Network congestion from other workloads"],
          effects: ["Slow oplog application on all replicas", "Delayed failover readiness", "Increased window of potential data inconsistency", "Cascading lag propagation"],
          mitigations: ["Use dedicated replication network", "Increase network bandwidth allocation", "Optimize replication batch size", "Use compression for replication traffic", "Reduce cross-AZ replication load"],
          metrics: ["Network latency to secondaries", "Replication bandwidth utilization", "Packet loss on replication links", "RTT to replicas", "Network throughput"],
          tradeoffs: ["Compression increases CPU usage", "Larger batches reduce latency but increase memory", "Dedicated network requires infrastructure cost"]
        },
        {
          name: "Disk",
          title: "Secondary disk saturation & write pressure",
          description: "Secondaries continuously write oplog entries and apply operations to their data files. When secondary disk throughput is lower than primary write throughput, the oplog application thread falls behind.",
          symptoms: ["Replication lag growing over time", "IO wait on secondary disks", "Slow disk writes visible in profiling", "Lag spikes during compaction on secondary"],
          causes: ["Secondary using slower disks than primary", "Heavy disk compaction competing with replication", "Too many partitions or collections competing for IO", "Background operations (indexing, garbage collection)"],
          effects: ["Oplog application lag accumulation", "Delayed replica availability for reads", "Cascading lag if secondary becomes primary", "Data inconsistency window increases"],
          mitigations: ["Upgrade secondary disk to match primary", "Schedule compaction during low-traffic periods", "Separate replication IO from application IO", "Increase background task parallelism", "Use better storage technology"],
          metrics: ["Secondary disk throughput", "IO wait percentage", "Flush latency", "Compaction frequency", "Oplog apply latency"],
          tradeoffs: ["SSD upgrade is expensive", "Scheduling compaction reduces availability", "Separating IO requires infrastructure changes"]
        },
        {
          name: "CPU",
          title: "CPU contention & oplog processing",
          description: "Applying oplog entries requires parsing operations, updating data structures, and maintaining consistency. Heavy write workloads or complex operations can cause CPU contention on the oplog application thread.",
          symptoms: ["High CPU usage during replication", "Oplog application thread at 100% CPU", "Lag increases despite sufficient disk/network", "Lag varies with query complexity"],
          causes: ["Complex write operations requiring heavy computation", "Thousands of writes per second to process", "Background queries competing for CPU", "Index updates during replication"],
          effects: ["Oplog application cannot keep up", "Replication lag growth", "Slower failover readiness", "Cascading failures if lag triggers priority change"],
          mitigations: ["Increase CPU resources on secondaries", "Batch writes into fewer operations", "Reduce concurrent background operations", "Optimize operation complexity", "Use faster CPUs"],
          metrics: ["CPU utilization on oplog thread", "Context switch rate", "Instructions per operation", "Background CPU contention", "Operation complexity metrics"],
          tradeoffs: ["CPU upgrade is expensive", "Batching increases latency", "Reducing operations changes application behavior"]
        }
      ],
      comparisons: [
        { tech: "PostgreSQL", problem: "Replication lag" },
        { tech: "Kafka", problem: "Replica fetch lag" },
        { tech: "Cassandra", problem: "Repair delays" },
        { tech: "MySQL", problem: "Binlog replication lag" },
        { tech: "AWS RDS", problem: "Replica sync lag" }
      ],
      insight: "MongoDB replication is fundamentally about throughput matching: the primary writes to the oplog at rate X, and secondaries must apply those operations at rate ≥ X. When any layer (network, disk, or CPU) cannot match the write throughput, lag accumulates. Understanding replication lag requires understanding your entire stack's bottleneck—it's rarely the replication protocol itself."
    };

    function renderPage() {
      const root = document.getElementById('root');
      let html = `<div class="hero"><p class="hero-eyebrow">${pageData.hero.eyebrow}</p><h1>${pageData.hero.title}</h1><p>${pageData.hero.description}</p></div><div class="section"><p class="section-label">Common synonyms</p><div class="pill-grid">${pageData.synonyms.map(s => `<span class="pill">${s}</span>`).join('')}</div></div><div class="section"><p class="section-label">How interviewers phrase this</p><div class="q-list">${pageData.questions.map(q => `<div class="q-item">${q}</div>`).join('')}</div></div><div class="section"><p class="section-label">Layer-by-layer breakdown</p><div class="layer-tabs">${pageData.layers.map((l, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="showLayer(${i})">${l.name}</button>`).join('')}</div>${pageData.layers.map((layer, idx) => `<div class="layer-card ${idx === 0 ? 'visible' : ''}" id="layer-${idx}"><p class="layer-title">${layer.title}</p><p class="layer-desc">${layer.description}</p><div class="layer-grid"><div class="sub-card"><p class="sub-label">Observable symptoms</p><ul class="sub-list">${layer.symptoms.map(s => `<li>${s}</li>`).join('')}</ul></div><div class="sub-card"><p class="sub-label">Root causes</p><ul class="sub-list">${layer.causes.map(c => `<li>${c}</li>`).join('')}</ul></div><div class="sub-card"><p class="sub-label">System effects</p><ul class="sub-list">${layer.effects.map(e => `<li>${e}</li>`).join('')}</ul></div><div class="sub-card"><p class="sub-label">Mitigations</p><ul class="sub-list">${layer.mitigations.map(m => `<li>${m}</li>`).join('')}</ul></div></div><div class="metrics-row"><span class="metrics-label">Key metrics</span>${layer.metrics.map(m => `<span class="metric-pill">${m}</span>`).join('')}</div><div class="tradeoff-box"><p class="tradeoff-label">Tradeoffs</p><ul class="tradeoff-list">${layer.tradeoffs.map(t => `<li>${t}</li>`).join('')}</ul></div></div>`).join('')}</div><div class="section"><p class="section-label">Universal distributed systems pattern</p><div class="compare-wrap"><table class="compare-table"><thead><tr><th>Technology</th><th>Equivalent problem</th></tr></thead><tbody>${pageData.comparisons.map(c => `<tr><td>${c.tech}</td><td>${c.problem}</td></tr>`).join('')}</tbody></table></div></div><div class="insight"><p>${pageData.insight}</p></div>`;
      root.innerHTML = html;
    }

    function showLayer(idx) {
      document.querySelectorAll('.layer-card').forEach((c, i) => {
        c.classList.toggle('visible', i === idx);
      });
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
    }

    renderPage();
  </script>
</body>
</html>
