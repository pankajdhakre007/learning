<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MongoDB — Query Performance Degradation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface-2: #1b1b21;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text-primary: #e8e6e1;
      --text-secondary: #8a8882;
      --text-tertiary: #55544f;
      --accent: #e85d26;
      --accent-dim: rgba(232, 93, 38, 0.12);
      --accent-border: rgba(232, 93, 38, 0.3);
      --info: #2d7dd2;
      --info-dim: rgba(45, 125, 210, 0.1);
      --info-border: rgba(45, 125, 210, 0.3);
      --warn-dim: rgba(200, 140, 40, 0.1);
      --warn-text: #c8a050;
      --warn-border: rgba(200, 140, 40, 0.25);
      --font-sans: 'IBM Plex Sans', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --radius: 6px;
      --radius-lg: 10px;
    }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }
    .page {
      max-width: 860px;
      margin: 0 auto;
    }
    .hero {
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius-lg);
      background: var(--surface);
      padding: 2rem 2.25rem 1.75rem;
      margin-bottom: 2rem;
    }
    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    .hero p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 680px;
    }
    .section { margin-bottom: 2rem; }
    .section-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }
    .pill-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill {
      font-size: 13px;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      transition: border-color 0.15s, color 0.15s;
    }
    .pill:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .q-list { display: flex; flex-direction: column; gap: 8px; }
    .q-item {
      font-size: 14px;
      line-height: 1.55;
      padding: 11px 15px 11px 42px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      position: relative;
      transition: border-color 0.15s;
    }
    .q-item::before {
      content: '"';
      position: absolute;
      left: 14px;
      top: 10px;
      font-family: var(--font-mono);
      font-size: 18px;
      color: var(--accent);
      line-height: 1;
    }
    .q-item:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .layer-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 1px;
    }
    .tab-btn {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 7px 16px;
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      background: var(--surface);
      color: var(--text-tertiary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      letter-spacing: 0.04em;
    }
    .tab-btn:hover { color: var(--text-secondary); background: var(--surface-2); }
    .tab-btn.active {
      background: var(--surface-2);
      color: var(--accent);
      border-color: var(--border);
      border-bottom: 1px solid var(--surface-2);
      position: relative;
      z-index: 1;
    }
    .layer-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0 var(--radius-lg) var(--radius-lg) var(--radius-lg);
      padding: 1.5rem 1.75rem;
      display: none;
    }
    .layer-card.visible { display: block; }
    .layer-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 0.4rem;
    }
    .layer-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .layer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .sub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
    }
    .sub-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 0.5rem;
    }
    .sub-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .sub-list li {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .sub-list li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--text-tertiary);
    }
    .metrics-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0.9rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
      align-items: center;
    }
    .metrics-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-right: 4px;
    }
    .metric-pill {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--info-dim);
      color: var(--info);
      border: 1px solid var(--info-border);
    }
    .tradeoff-box {
      background: var(--warn-dim);
      border: 1px solid var(--warn-border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .tradeoff-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--warn-text);
      margin-bottom: 0.4rem;
    }
    .tradeoff-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .tradeoff-list li {
      font-size: 13px;
      color: var(--warn-text);
      line-height: 1.5;
      padding-left: 14px;
      position: relative;
    }
    .tradeoff-list li::before {
      content: '⚠';
      position: absolute;
      left: 0;
      font-size: 10px;
      top: 2px;
    }
    .compare-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .compare-table th {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .compare-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 13px;
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table td:first-child {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
    }
    .compare-table td:last-child {
      color: var(--accent);
    }
    .compare-table tr:hover td { background: var(--surface-2); }
    .insight {
      border-left: 3px solid var(--accent);
      padding: 1rem 1.25rem;
      margin-top: 2rem;
      background: var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .insight p {
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.7;
    }
    @media (max-width: 600px) {
      .layer-grid { grid-template-columns: 1fr; }
      .hero { padding: 1.5rem 1.25rem; }
      .hero h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>
  <script>
    const pageData = {
      hero: {
        eyebrow: "MongoDB — distributed data systems",
        title: "Query performance degradation",
        description: "Staff+/Principal-level guide covering slow queries, collection scans, index misses, aggregation bottlenecks, and query execution pressure across MongoDB deployments."
      },
      synonyms: [
        "Slow queries",
        "Query latency",
        "Collection scans",
        "Query execution bottlenecks",
        "Index misses",
        "Query planner issues",
        "Inefficient query design",
        "Aggregation pipeline bottlenecks"
      ],
      questions: [
        "Why is my MongoDB query suddenly slow?",
        "How do I detect full collection scans?",
        "Why is CPU spiking for specific queries?",
        "How do I optimize aggregation pipelines?",
        "What causes query planner regressions?",
        "How do I identify missing indexes?",
        "Why are my dashboards responding slowly?",
        "How do I debug large document scans?"
      ],
      layers: [
        {
          name: "Index Layer",
          title: "Index & query planning layer",
          description: "MongoDB queries rely on index selection for performance. Poor index design, missing indexes, or query planner regressions cause the database to perform full collection scans, resulting in high CPU and latency.",
          symptoms: ["Full collection scans visible in explain output", "High CPU usage for specific queries", "Slow dashboard APIs", "Query timeout spikes", "Increasing query latency"],
          causes: ["Missing indexes on frequently queried fields", "Low-cardinality indexes on high-cardinality data", "Query planner choosing suboptimal indexes", "Sparse or partial indexes not matching query patterns"],
          effects: ["Collection-wide scanning overhead", "CPU saturation on mongod process", "Memory pressure from scanning documents", "Slow application response times", "Cascading slowdowns in dependent services"],
          mitigations: ["Add missing indexes on frequently queried fields", "Analyze query patterns with explain() and indexStats", "Rebuild fragmented indexes", "Use covered queries when possible", "Optimize index selectivity"],
          metrics: ["Execution stage in explain output", "Docs scanned vs docs returned", "CPU usage per query", "Query latency percentiles", "Cache hit ratio"],
          tradeoffs: ["More indexes increase write latency", "Index maintenance adds overhead", "Memory usage increases with index count"]
        },
        {
          name: "Aggregation",
          title: "Aggregation pipeline bottlenecks",
          description: "Aggregation pipelines can become CPU-intensive and memory-constrained when stages execute in the wrong order, lack indexes, or operate on large datasets without proper filtering.",
          symptoms: ["Aggregation queries timeout", "High memory usage during aggregation", "CPU spikes during pipeline execution", "Slow dashboard computations"],
          causes: ["$lookup operations on large collections without indexes", "$group stages without pre-filtering", "Expensive string operations in pipelines", "Sorting large result sets in memory"],
          effects: ["CPU exhaustion during aggregation", "Memory pressure and potential OOMKills", "Slow analytics queries", "Increased latency for all users"],
          mitigations: ["Push $match stages early to filter documents", "Use $allowDiskUse for large sorts and groups", "Avoid $lookup on non-indexed fields", "Optimize expression complexity", "Use $project to reduce document size"],
          metrics: ["Pipeline execution time", "Memory used during aggregation", "Stages causing slowdown", "Network bytes out", "CPU time per stage"],
          tradeoffs: ["$allowDiskUse impacts performance vs memory", "Complex projections reduce memory but add CPU", "Early filtering reduces throughput but improves latency"]
        },
        {
          name: "Large Scans",
          title: "Large document & collection scanning",
          description: "Scanning large documents or entire collections without proper filtering causes severe performance degradation. MongoDB must load each document into memory, parse it, and apply filters.",
          symptoms: ["Query latency increases with collection size", "Memory usage spikes during queries", "Slow response times for range queries", "OOMKill on aggregation operations"],
          causes: ["Queries scanning entire collections without index support", "Large document sizes (>16MB) being scanned", "Pagination without proper indexing", "Time-series data without time-range filtering"],
          effects: ["Linear latency degradation with data growth", "Memory exhaustion on secondary reads", "Impact on other queries sharing resources", "Cascading slowdowns across application"],
          mitigations: ["Add indexes to support range queries", "Use pagination with indexed sort fields", "Implement time-range filtering for time-series data", "Archive old data to reduce active collection size", "Use projection to fetch only needed fields"],
          metrics: ["Bytes scanned per query", "Documents scanned ratio", "Memory usage during query", "Query execution time", "Collection size trends"],
          tradeoffs: ["Pagination adds complexity to application code", "Data archival reduces feature scope", "Projection limits available fields in queries"]
        },
        {
          name: "Execution",
          title: "Query execution pressure & contention",
          description: "Query execution pressure occurs when too many concurrent queries compete for resources, causing contention, lock delays, and cascading latency increases.",
          symptoms: ["Increased query latency under load", "Lock waits visible in profiling", "Queued operations in currentOp", "Uneven query latency distribution"],
          causes: ["Too many concurrent queries on same collection", "Write-heavy workloads blocking reads", "Long-running queries holding locks", "Inefficient queries running at scale"],
          effects: ["Query queue buildup", "Latency tail increases dramatically", "Timeout failures under load", "Application cascading failures"],
          mitigations: ["Increase replica set size for read scaling", "Use connection pooling with appropriate limits", "Kill long-running queries proactively", "Scale horizontally with sharding", "Use read preferences to distribute read load"],
          metrics: ["Queue length", "Lock wait time", "Concurrent operations", "Average query latency", "95th/99th percentile latency"],
          tradeoffs: ["More replicas increase replication overhead", "Sharding adds complexity and routing overhead", "Connection limits reduce throughput"]
        }
      ],
      comparisons: [
        { tech: "PostgreSQL", problem: "Slow sequential scans" },
        { tech: "Cassandra", problem: "Partition scan latency" },
        { tech: "Elasticsearch", problem: "Query execution pressure" },
        { tech: "Redis", problem: "Scan command blocking" },
        { tech: "DynamoDB", problem: "Index scan pressure" }
      ],
      insight: "MongoDB query performance is fundamentally determined by index selectivity and execution planning. Strong engineers optimize not just for single queries, but for query patterns and resource contention under load. Query analysis becomes system design: understanding access patterns, building appropriate indexes, and designing schemas that support efficient queries at scale."
    };

    function renderPage() {
      const root = document.getElementById('root');
      let html = `
        <div class="hero">
          <p class="hero-eyebrow">${pageData.hero.eyebrow}</p>
          <h1>${pageData.hero.title}</h1>
          <p>${pageData.hero.description}</p>
        </div>
        <div class="section">
          <p class="section-label">Common synonyms</p>
          <div class="pill-grid">
            ${pageData.synonyms.map(s => `<span class="pill">${s}</span>`).join('')}
          </div>
        </div>
        <div class="section">
          <p class="section-label">How interviewers phrase this</p>
          <div class="q-list">
            ${pageData.questions.map(q => `<div class="q-item">${q}</div>`).join('')}
          </div>
        </div>
        <div class="section">
          <p class="section-label">Layer-by-layer breakdown</p>
          <div class="layer-tabs">
            ${pageData.layers.map((l, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="showLayer(${i})">${l.name}</button>`).join('')}
          </div>
          ${pageData.layers.map((layer, idx) => `
            <div class="layer-card ${idx === 0 ? 'visible' : ''}" id="layer-${idx}">
              <p class="layer-title">${layer.title}</p>
              <p class="layer-desc">${layer.description}</p>
              <div class="layer-grid">
                <div class="sub-card">
                  <p class="sub-label">Observable symptoms</p>
                  <ul class="sub-list">
                    ${layer.symptoms.map(s => `<li>${s}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">Root causes</p>
                  <ul class="sub-list">
                    ${layer.causes.map(c => `<li>${c}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">System effects</p>
                  <ul class="sub-list">
                    ${layer.effects.map(e => `<li>${e}</li>`).join('')}
                  </ul>
                </div>
                <div class="sub-card">
                  <p class="sub-label">Mitigations</p>
                  <ul class="sub-list">
                    ${layer.mitigations.map(m => `<li>${m}</li>`).join('')}
                  </ul>
                </div>
              </div>
              <div class="metrics-row">
                <span class="metrics-label">Key metrics</span>
                ${layer.metrics.map(m => `<span class="metric-pill">${m}</span>`).join('')}
              </div>
              <div class="tradeoff-box">
                <p class="tradeoff-label">Tradeoffs</p>
                <ul class="tradeoff-list">
                  ${layer.tradeoffs.map(t => `<li>${t}</li>`).join('')}
                </ul>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="section">
          <p class="section-label">Universal distributed systems pattern</p>
          <div class="compare-wrap">
            <table class="compare-table">
              <thead>
                <tr>
                  <th>Technology</th>
                  <th>Equivalent problem</th>
                </tr>
              </thead>
              <tbody>
                ${pageData.comparisons.map(c => `<tr><td>${c.tech}</td><td>${c.problem}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="insight">
          <p>${pageData.insight}</p>
        </div>
      `;
      root.innerHTML = html;
    }

    function showLayer(idx) {
      document.querySelectorAll('.layer-card').forEach((c, i) => {
        c.classList.toggle('visible', i === idx);
      });
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
    }

    renderPage();
  </script>
</body>
</html>
